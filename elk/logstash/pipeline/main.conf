
input {
    beats {
        port => 5044
        host => "0.0.0.0"
        client_inactivity_timeout => 300
    }
}

filter {
    if "nginx" in [tags] {
        mutate {
            add_field => {
                "[@metadata][target_index]" => "nginx"
                "[@metadata][ilm_policy]" => "nginx_logs_policy"
            }
        }

        grok {
            match => {
                "message" => [
                    '%{IPORHOST:nginx.access.remote_ip} - %{DATA:nginx.access.remote_user} \[%{HTTPDATE:nginx.access.time}\] "%{WORD:http.request.method} %{DATA:url.original} HTTP/%{NUMBER:http.version}" %{NUMBER:http.response.status_code:int} (?:%{NUMBER:http.response.body.bytes:int}|-) "(?:%{DATA:http.request.referrer}|-)" "(?:%{DATA:user_agent.original}|-)"'
                ]
            }
            tag_on_failure => ["_nginx_grok_failure"]
        }

        date {
            match => ["[nginx][access][time]", "dd/MMM/yyyy:HH:mm:ss Z"]
            target => "@timestamp"
            tag_on_failure => ["_nginx_date_failure"]
        }

        if [user_agent][original] {
            useragent {
                source => "[user_agent][original]"
                target => "[user_agent]"
            }
        }
    } else if "flask-app" in [tags] {
        mutate {
            add_field => {
                "[@metadata][target_index]" => "flask-app"
                "[@metadata][ilm_policy]" => "flask_app_logs_policy"
            }
        }
    } else {
        drop { }
    }
}

output {
    if [@metadata][target_index] == "nginx" {
        elasticsearch {
            hosts => [ "${ELASTICSEARCH_HOST_PORT}" ]
            user => "${ELASTIC_USERNAME}"
            password => "${ELASTIC_PASSWORD}"
            ssl => true
            ssl_certificate_verification => false
            cacert => "/certs/ca.crt"
            manage_template => false
            ilm_enabled => true
            ilm_rollover_alias => "nginx"
            ilm_pattern => "{now/d}-000001"
            ilm_policy => "nginx_logs_policy"
        }
    } else if [@metadata][target_index] == "flask-app" {
        elasticsearch {
            hosts => [ "${ELASTICSEARCH_HOST_PORT}" ]
            user => "${ELASTIC_USERNAME}"
            password => "${ELASTIC_PASSWORD}"
            ssl => true
            ssl_certificate_verification => false
            cacert => "/certs/ca.crt"
            manage_template => false
            ilm_enabled => true
            ilm_rollover_alias => "flask-app"
            ilm_pattern => "{now/d}-000001"
            ilm_policy => "flask_app_logs_policy"
        }
    }
}