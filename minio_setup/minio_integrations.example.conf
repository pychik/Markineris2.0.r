# Format:
# integration_name|minio_user|password_or_@file|bucket_name|prefix|access_mode
#
# access_mode values:
#   upload-only - can upload objects into the prefix, but cannot read them back.
#   readonly    - can list/read objects under the prefix.
#   readwrite   - can list/read/write/delete objects under the prefix.
#
# Notes:
# - Real secrets should live in minio_integrations.local.conf or in mounted secret files.
# - Files ending with .local.conf are ignored by git.
# - To load password from a file, use @/path/to/file or file:/path/to/file.
# - Prefix may be empty to grant access to the whole bucket.
#
# Example with a local ignored config file:
# litemark|litemark-uploader|CHANGE_ME|litemark-results|incoming|upload-only
#
# Example with a mounted Docker/Kubernetes secret:
#processor-a|processor-a-uploader|@/run/secrets/minio_processor_a_password|processor-results|incoming/processor-a|upload-only