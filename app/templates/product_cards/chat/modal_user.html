<div class="modal fade" id="pc-chat-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-md modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="pc-chat-modal-title">Чат карточки</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
      </div>

      <div class="modal-body">

        <div id="pc-chat-list" style="min-height: 240px;">
          <!-- messages -->
        </div>

        <hr>

        <div class="pc-chat">

          <textarea
            class="pc-chat__input"
            id="pc-chat-input"
            rows="1"
            maxlength="300"
            placeholder="Введите сообщение (до 300 символов)">
          </textarea>

          <div class="pc-chat__buttons">
            <button
              type="button"
              class="pc-chat__btn pc-chat__btn--send"
              id="pc-chat-send-btn"
              title="Отправить">
              →
            </button>

            <button
              type="button"
              class="pc-chat__btn pc-chat__btn--refresh"
              id="pc-chat-refresh-btn"
              title="Обновить">
              ⟳
            </button>
          </div>

      </div>
      <div class="small text-muted ms-1">
          <span id="pc-chat-counter">0/300</span>
      </div>
    </div>


      </div>

    </div>
  </div>
</div>
