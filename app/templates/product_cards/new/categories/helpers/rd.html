        <div class="row g-3 mt-1">
          <!-- ЛЕВО: основные поля РД -->
          <div class="col-md-6">
            <div class="form-group" title="Тип документа">
              <label for="rd_type" class="col-form-label text-right" style="display:none">Тип документа</label>
              <select class="form-control search-select" id="rd_type" name="rd_type">
                <option selected value="">Выберите тип документа</option>

                  <option value="{{ rd }}"

          <!-- ПРАВО: даты друг под другом -->
 <style>
  .rd-date-picker-proxy {
    position: absolute !important;
    width: 0 !important;
    height: 0 !important;
    opacity: 0 !important;
    border: 0 !important;
    padding: 0 !important;
    margin: 0 !important;
    pointer-events: none !important;
  }
 </style>
 <script>
  $(function () {
    const today = new Date();

    const currentYear = today.getFullYear();
    const maxYearTo = currentYear + 5;

    // --- ограничения ---
    const minAllowedDate = new Date(2022, 0, 1); // 01.01.2022

    const minToDate = new Date(
      today.getFullYear(),
      today.getMonth() + 1,
      today.getDate()
    );

    // --- yearRange ---
    const yearRangeFromStr = `2022:${currentYear}`;        // ОТ: до сегодня
    const yearRangeToStr   = `${currentYear}:${maxYearTo}`; // ДО: +5 лет
    const maxToDate = new Date(maxYearTo, 11, 31);

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function formatRdDate(date) {
      return `${pad2(date.getDate())}.${pad2(date.getMonth() + 1)}.${date.getFullYear()}`;
    }

    function parseManualRdDate(value) {
      const raw = (value || "").trim();
      if (!raw) return null;

      let day;
      let month;
      let year;
      const digitsOnly = raw.replace(/\D/g, "");

      if (/^\d{8}$/.test(digitsOnly) && raw === digitsOnly) {
        day = Number(digitsOnly.slice(0, 2));
        month = Number(digitsOnly.slice(2, 4));
        year = Number(digitsOnly.slice(4, 8));
      } else if (/^\d{6}$/.test(digitsOnly) && raw === digitsOnly) {
        day = Number(digitsOnly.slice(0, 2));
        month = Number(digitsOnly.slice(2, 4));
        year = 2000 + Number(digitsOnly.slice(4, 6));
      } else {
        const parts = raw.split(/[.\-/\s]+/).filter(Boolean);
        if (parts.length !== 3 || parts[0].length === 4) return null;

        day = Number(parts[0]);
        month = Number(parts[1]);
        year = Number(parts[2]);
        if (parts[2].length === 2) year = 2000 + year;
      }

      if (!Number.isInteger(day) || !Number.isInteger(month) || !Number.isInteger(year)) return null;
      if (year < 1000 || year > maxYearTo) return null;

      const parsed = new Date(year, month - 1, day);
      if (
        parsed.getFullYear() !== year ||
        parsed.getMonth() !== month - 1 ||
        parsed.getDate() !== day
      ) {
        return null;
      }

      return parsed;
    }

    function clearDateError($el) {
      $el.removeClass("is-invalid");
      $el.removeAttr("title");
    }

    function setDateError($el, message) {
      $el.addClass("is-invalid");
      $el.attr("title", message);
    }

    function dateOnly(date) {
      if (!date) return null;
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function maxDate(a, b) {
      if (!a) return b;
      if (!b) return a;
      return a > b ? a : b;
    }

    function rawDateValue($el) {
      const manualRaw = $el.data("manualRaw");
      if (typeof manualRaw === "string") return manualRaw.trim();
      return ($el.val() || "").trim();
    }

    function pickerId(inputId) {
      return `${inputId}_picker`;
    }

    function pickerFor(inputId) {
      return $("#" + pickerId(inputId));
    }

    function setCalendarButtonVisible(inputId, visible) {
      $(`.js-rd-calendar-btn[data-target="${inputId}"]`).toggleClass("d-none", !visible);
    }

    function syncCalendarButtonVisibility(inputId) {
      setCalendarButtonVisible(inputId, !$("#" + inputId).val().trim());
    }

    function readParsedDate(inputId) {
      const $el = $("#" + inputId);
      const raw = rawDateValue($el);
      return raw ? parseManualRdDate(raw) : null;
    }

    function readValidFromDate() {
      const from = readParsedDate("rd_date");
      const valueDate = dateOnly(from);
      if (!valueDate) return null;
      if (valueDate < dateOnly(minAllowedDate)) return null;
      if (valueDate > dateOnly(today)) return null;
      return from;
    }

    function getRdDateBounds(inputId) {
      if (inputId === "rd_date") {
        return {
          minDate: minAllowedDate,
          maxDate: today
        };
      }

      return {
        minDate: maxDate(minToDate, readValidFromDate()),
        maxDate: maxToDate
      };
    }

    function applyDatepickerBounds(inputId) {
      const bounds = getRdDateBounds(inputId);
      pickerFor(inputId).datepicker("option", "minDate", bounds.minDate);
      pickerFor(inputId).datepicker("option", "maxDate", bounds.maxDate);
      return bounds;
    }

    function validateRdDateValue($el, parsed, label) {
      const bounds = getRdDateBounds($el.attr("id"));
      const valueDate = dateOnly(parsed);
      const minDate = dateOnly(bounds.minDate);
      const maxDate = dateOnly(bounds.maxDate);

      if (minDate && valueDate < minDate) {
        setDateError($el, `${label}: дата не может быть раньше ${formatRdDate(minDate)}`);
        return false;
      }

      if (maxDate && valueDate > maxDate) {
        setDateError($el, `${label}: дата не может быть позже ${formatRdDate(maxDate)}`);
        return false;
      }

      return true;
    }

    function normalizeByDatepickerBounds($el, label) {
      const raw = rawDateValue($el);
      if (!raw) {
        clearDateError($el);
        pickerFor($el.attr("id")).datepicker("setDate", null);
        $el.removeData("manualRaw");
        setCalendarButtonVisible($el.attr("id"), true);
        return null;
      }

      const parsed = parseManualRdDate(raw);
      if (!parsed) {
        setDateError($el, `${label}: укажите дату в формате ДД.ММ.ГГГГ`);
        return null;
      }

      if (!validateRdDateValue($el, parsed, label)) {
        return null;
      }

      pickerFor($el.attr("id")).datepicker("setDate", parsed);
      $el.val(formatRdDate(parsed));
      $el.removeData("manualRaw");
      clearDateError($el);
      setCalendarButtonVisible($el.attr("id"), false);
      return parsed;
    }

    function openRdDatepicker(inputId) {
      const $el = $("#" + inputId);
      applyDatepickerBounds(inputId);
      normalizeByDatepickerBounds($el, inputId === "rd_date" ? "РД дата 'От'" : "РД дата 'До'");
      $el.removeData("manualRaw");
      applyDatepickerBounds(inputId);
      pickerFor(inputId).datepicker("show");
    }

    function syncRdDateConstraints() {
      applyDatepickerBounds("rd_date");
      applyDatepickerBounds("rd_date_to");

      const from = readValidFromDate();
      const to = readParsedDate("rd_date_to");
      if (from) {
        const newMinTo = maxDate(from, minToDate);
        pickerFor("rd_date_to").datepicker("option", "minDate", newMinTo);

        if (to && to < newMinTo) {
          $("#rd_date_to").val("");
          pickerFor("rd_date_to").datepicker("setDate", null);
          setCalendarButtonVisible("rd_date_to", true);
        }
      } else {
        pickerFor("rd_date_to").datepicker("option", "minDate", minToDate);
      }
    }

    function normalizeRdDateInputs() {
      const errors = [];
      const $from = $("#rd_date");
      const $to = $("#rd_date_to");

      normalizeByDatepickerBounds($from, "РД дата 'От'");
      syncRdDateConstraints();
      normalizeByDatepickerBounds($to, "РД дата 'До'");
      syncRdDateConstraints();

      if ($from.hasClass("is-invalid")) errors.push($from.attr("title"));
      if ($to.hasClass("is-invalid")) errors.push($to.attr("title"));

      return errors.filter(Boolean);
    }

    window.pcNormalizeRdDates = normalizeRdDateInputs;
    window.pcClearRdDate = function (inputId) {
      const $el = $("#" + inputId);
      pickerFor(inputId).datepicker("setDate", null);
      $el.val("");
      $el.removeData("manualRaw");
      clearDateError($el);
      setCalendarButtonVisible(inputId, true);
      syncRdDateConstraints();
    };

    // ===== ОТ =====
    pickerFor("rd_date").datepicker({
      dateFormat: "dd.mm.yy",
      changeMonth: true,
      changeYear: true,
      constrainInput: false,
      yearRange: yearRangeFromStr,
      minDate: minAllowedDate,
      maxDate: today,                 // ⬅️ КЛЮЧЕВО
      onSelect: function (dateText) {
        const $el = $("#rd_date");
        const selected = parseManualRdDate(dateText);
        if (selected && validateRdDateValue($el, selected, "РД дата 'От'")) {
          pickerFor("rd_date").datepicker("setDate", selected);
          $el.val(formatRdDate(selected));
          $el.removeData("manualRaw");
          clearDateError($el);
          setCalendarButtonVisible("rd_date", false);
        } else {
          pickerFor("rd_date").datepicker("setDate", null);
          $el.val("");
          $el.removeData("manualRaw");
          setCalendarButtonVisible("rd_date", true);
        }
        syncRdDateConstraints();
      },
      onClose: function () {
        syncRdDateConstraints();
      }
    });

    // ===== ДО =====
    pickerFor("rd_date_to").datepicker({
      dateFormat: "dd.mm.yy",
      changeMonth: true,
      changeYear: true,
      constrainInput: false,
      yearRange: yearRangeToStr,
      minDate: minToDate,
      maxDate: maxToDate,
      onSelect: function (dateText) {
        const $el = $("#rd_date_to");
        const selected = parseManualRdDate(dateText);
        if (selected && validateRdDateValue($el, selected, "РД дата 'До'")) {
          pickerFor("rd_date_to").datepicker("setDate", selected);
          $el.val(formatRdDate(selected));
          $el.removeData("manualRaw");
          clearDateError($el);
          setCalendarButtonVisible("rd_date_to", false);
        } else {
          pickerFor("rd_date_to").datepicker("setDate", null);
          $el.val("");
          $el.removeData("manualRaw");
          setCalendarButtonVisible("rd_date_to", true);
        }
        syncRdDateConstraints();
      },
      onClose: function () {
        syncRdDateConstraints();
      }
    });

    syncRdDateConstraints();
    syncCalendarButtonVisibility("rd_date");
    syncCalendarButtonVisibility("rd_date_to");

    $("#rd_date, #rd_date_to").on("blur", function () {
      const input = this;
      setTimeout(function () {
        if ($("#ui-datepicker-div").is(":visible")) return;

        const $el = $(input);
        const label = input.id === "rd_date" ? "РД дата 'От'" : "РД дата 'До'";
        normalizeByDatepickerBounds($el, label);
        syncRdDateConstraints();
      }, 0);
    });

    $("#rd_date, #rd_date_to").on("input", function () {
      const $el = $(this);
      $el.data("manualRaw", $el.val());
      clearDateError($el);
      pickerFor(this.id).datepicker("hide");
      setCalendarButtonVisible(this.id, !$el.val().trim());
    });

    $("#rd_date, #rd_date_to").on("keydown", function (event) {
      if (event.key === "Enter") {
        normalizeRdDateInputs();
      }
    });

    $(".js-rd-calendar-btn").on("mousedown", function (event) {
      event.preventDefault();
    });

    $(".js-rd-calendar-btn").on("click", function () {
      openRdDatepicker(this.dataset.target);
    });
  });
</script>
