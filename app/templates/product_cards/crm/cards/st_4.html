<div class="crm__col">
  <div class="orders">
    <h2 class="orders__title">
      На уточнении <span id="clarification_cards_qty">({{ clarification_cards|length }})</span>
      <img src="{{ url_for('static', filename='crm_mod/img/icons/download.svg') }}"
       role="button"
       width="18" height="18"
       class="ms-1 icon-grey-filter"
       data-bs-toggle="tooltip"
       data-bs-title="Скачать на уточнении (по фирмам)"
       onclick="pcDownloadCompaniesByStatus('clarification')">
    <button type="button"
              class="btn btn-sm btn-outline-secondary ms-2 px-2 py-0"
              id="pc-bulk-start-clarification"
              data-bs-toggle="tooltip"
              data-bs-title="Выбрать несколько"
              onclick="pcToggleBulkMode('clarification')">
        ✓✓
      </button>
    </h2>
    <div class="d-none mb-2"
         id="pc-bulk-panel-clarification"
         style="display:flex; align-items:center; justify-content:center; gap:.5rem;">
      <span class="text-muted small me-2">
        Выбрано: <b id="pc-bulk-count-clarification">0</b>
      </span>
      <span role="button"
            class="text-muted"
            style="font-size:24px; line-height:1;"
            data-bs-toggle="tooltip"
            data-bs-title="Перенести на модерацию"
            onclick="pcBulkMoveSelected('clarification', 'in_moderation')">✓</span>
      <span role="button"
            class="text-muted"
            style="font-size:26px; line-height:1;"
            data-bs-toggle="tooltip"
            data-bs-title="Отмена"
            onclick="pcSetBulkMode('clarification', false)">×</span>
    </div>
    <div style="width:335px"></div>

    <div id="clarification_cards_main">
      <div class="orders__list" id="clarification_cards_list">
        {% include 'product_cards/crm/cards/updated_stages/_clarification_list.html' %}
      </div>
    </div>
  </div>
</div>
