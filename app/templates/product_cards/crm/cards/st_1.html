<div class="crm__col">
  <div class="orders">
    <h2 class="orders__title">
      Отправленные заявки <span id="sent_cards_qty">({{ sent_cards|length }})</span>
      <button
        type="button"
        class="crm-download-icon-btn"
        title="Массово перенести 'Отправленные' → 'В обработке' и закрепить за мной"
        onclick="transferSentToInProgressCards()">
        <svg xmlns="http://www.w3.org/2000/svg"
             width="20"
             height="20"
             fill="grey"
             viewBox="0 0 16 16">
          <!-- верхняя стрелка -->
          <path d="M5 2.5a.5.5 0 0 1 .5-.5h3.793L8.146.854a.5.5 0 1 1 .708-.708l2 2a.5.5 0 0 1 0 .708l-2 2a.5.5 0 1 1-.708-.708L9.293 3H5.5a.5.5 0 0 1-.5-.5z"/>

          <!-- средняя стрелка -->
          <path d="M5 8a.5.5 0 0 1 .5-.5h3.793L8.146 6.354a.5.5 0 1 1 .708-.708l2 2a.5.5 0 0 1 0 .708l-2 2a.5.5 0 1 1-.708-.708L9.293 8.5H5.5a.5.5 0 0 1-.5-.5z"/>

          <!-- нижняя стрелка -->
          <path d="M5 13.5a.5.5 0 0 1 .5-.5h3.793l-1.147-1.146a.5.5 0 0 1 .708-.708l2 2a.5.5 0 0 1 0 .708l-2 2a.5.5 0 0 1-.708-.708L9.293 14H5.5a.5.5 0 0 1-.5-.5z"/>
        </svg>

      </button>
      <img src="{{ url_for('static', filename='crm_mod/img/icons/download.svg') }}"
       role="button"
       width="18" height="18"
       class="ms-3 icon-grey-filter"
       data-bs-toggle="tooltip"
       data-bs-title="Скачать отправленные (по фирмам)"
       onclick="pcDownloadCompaniesByStatus('sent')">
    </h2>

<div style="width:335px"></div>
    <div id="sent_cards_main">
      <div class="orders__list" id="sent_cards_list">

        {% include 'product_cards/crm/cards/updated_stages/_sent_list.html' %}

      </div>
    </div>
  </div>
</div>
