<div class="crm__col">
  <div class="orders">
    <h2 class="orders__title">
      Частично одобренные <span id="partially_approved_cards_qty">({{ partially_approved_cards|length }})</span>
      <img src="{{ url_for('static', filename='crm_mod/img/icons/refresh.svg') }}"
       role="button"
       width="18" height="18"
       data-bs-toggle="tooltip"
       data-bs-title="Обновить"
       onclick="pcReloadColumn('partially_approved')">
      <img src="{{ url_for('static', filename='crm_mod/img/icons/download.svg') }}"
         role="button"
         width="18" height="18"
         class="ms-1 icon-grey-filter"
         data-bs-toggle="tooltip"
         data-bs-title="Скачать частично одобренные (по фирмам)"
         onclick="pcDownloadCompaniesByStatus('partially_approved')">


    </h2>

    <div style="width:335px"></div>

    <div id="partially_approved_cards_main">
      <div class="orders__list" id="partially_approved_cards_list">
        {% include 'product_cards/crm/cards/updated_stages/_partially_approved_list.html' %}
      </div>
    </div>
  </div>
</div>
