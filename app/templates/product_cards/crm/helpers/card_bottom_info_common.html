<div class="order__small-text">
  <div class="order__num">
    Пользователь: <span class="text-secondary">{{ c.user_login}}</span>

  </div>
  {% include 'product_cards/crm/helpers/card_manager_info.html' %}
  <div class="order__num">
    Артикул: <span class="text-secondary" data-copy="{{ c.article_or_trademark }}" onclick="copy_buffer(this.dataset.copy, event)">{{ c.article_or_trademark }}</span><br>
  </div>
  <div class="order__time"
       data-bs-toggle="tooltip"
       data-bs-html="true"
       data-bs-placement="right"
       data-bs-title="Отправлено в CRM карточек: {{ c.sent_at.strftime('%d-%m-%Y %H:%M:%S') }}">
    {{ c.created_at | time_since_top }}
  </div>

</div>
