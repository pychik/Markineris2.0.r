<span class="me-1 pc-chat-wrap position-relative" style="display:inline-block;">
  <img src="{{ url_for('static', filename='crm_mod/img/icons/chat.svg') }}"
       role="button"
    class="pc-chat-btn order-chat-btn"
       onclick="orderChatOpen(this)"
       data-bs-toggle="tooltip"
       data-bs-title="Чат"
       data-order-id="{{ n.id }}"
       data-order-idn="{{ n.order_idn | default('', true) }}">

  {% set unread = n.unread_chat_count | default(0, true) %}
  {% if unread and unread > 0 %}
    <span class="badge rounded-pill bg-warning text-dark position-absolute"
          style="top:-8px; right:-10px; font-size:11px;">
      +{{ unread }}
    </span>
  {% endif %}
</span>
